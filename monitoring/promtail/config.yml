server:
    http_listen_port: 9080
    grpc_listen_port: 0

positions:
    filename: /tmp/positions.yaml

clients:
    - url: http://loki:3100/loki/api/v1/push

scrape_configs:
    - job_name: docker-containers
      docker_sd_configs:
          - host: unix:///var/run/docker.sock
            refresh_interval: 5s
            filters:
                - name: name
                  values:
                    - graveboards-backend
                    - graveboards-frontend
                    - graveboards-postgresql
                    - graveboards-redis
      relabel_configs:
          - source_labels:
                - __meta_docker_container_name
            target_label: container
          - source_labels:
                - __meta_docker_container_log_stream
            target_label: stream
          - source_labels:
                - __meta_docker_container_label_com_docker_compose_service
            target_label: service

      pipeline_stages:
          - json:
              expressions:
                  timestamp: timestamp
                  level: level
                  logger: logger
                  message: message
                  request_id: request_id
          - timestamp:
              source: timestamp
              format: '2006-01-02T15:04:05'
          - labels:
              level:
              logger:
              request_id:
