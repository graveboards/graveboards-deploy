server:
    http_listen_port: 9080
    grpc_listen_port: 0

positions:
    filename: /tmp/positions.yaml

clients:
    - url: http://loki:3100/loki/api/v1/push

scrape_configs:
    # Backend now writes structured JSON straight to a file (see
    # app/observability/logging.py) instead of stdout, so stdout can stay
    # human-readable in every environment without a LOG_FORMAT env var.
    # Tailing the file directly means every JSON object is already exactly
    # one line — no multiline stage needed, structlog renders exceptions as
    # a single field before the line is ever written.
    - job_name: backend-json-logs
      static_configs:
          - targets:
                - localhost
            labels:
                service: backend
                __path__: /var/log/graveboards/backend/logs/app.jsonl
      pipeline_stages:
          - json:
              expressions:
                  timestamp: timestamp
                  level: level
                  logger: logger
                  event: event
                  request_id: request_id
          - timestamp:
              source: timestamp
              format: '2006-01-02T15:04:05.000000Z07:00'
          - labels:
              level:

    - job_name: infra-logs
      docker_sd_configs:
          - host: unix:///var/run/docker.sock
            refresh_interval: 5s
            filters:
                - name: name
                  values:
                    - graveboards-postgresql
                    - graveboards-redis
                    - graveboards-prometheus
                    - graveboards-grafana
                    - graveboards-alertmanager
                    - graveboards-loki
                    - graveboards-promtail
      relabel_configs:
          # Docker's name filter above substring-matches, so it also picks up
          # graveboards-redis-exporter, graveboards-postgres-exporter, etc;
          # drop the metrics-only exporters here (they have no useful logs).
          - source_labels:
                - __meta_docker_container_label_com_docker_compose_service
            regex: '(?:.*-exporter)'
            action: drop
          - source_labels:
                - __meta_docker_container_label_com_docker_compose_service
            target_label: service
          - source_labels:
                - __meta_docker_container_log_stream
            target_label: stream
