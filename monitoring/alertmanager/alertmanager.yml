global:
    resolve_timeout: 5m

route:
    group_by:
        - alertname
        - severity
    group_wait: 10s
    group_interval: 10s
    repeat_interval: 1h
    receiver: discord
    routes:
        - match:
            severity: critical
          receiver: discord
          repeat_interval: 30m
        - match:
            severity: warning
          receiver: discord
          repeat_interval: 1h
        - match:
            severity: info
          receiver: discord
          repeat_interval: 2h

receivers:
    - name: discord
      discord_configs:
          - send_resolved: true
            webhook_url: ${ALERTMANAGER_DISCORD_WEBHOOK_URL}

inhibit_rules:
    - source_match:
        severity: critical
      target_match:
        severity: warning
      equal:
          - alertname
          - instance
