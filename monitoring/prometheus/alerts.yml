groups:
    - name: graveboards-alerts
      rules:
          - alert: ServiceDown
            expr: up{job="graveboards-backend"} == 0
            for: 2m
            labels:
                severity: critical
            annotations:
                summary: "Graveboards backend is down"
                description: "The Graveboards backend service has been unreachable for more than 2 minutes."

          - alert: PrometheusDown
            expr: up{job="prometheus"} == 0
            for: 2m
            labels:
                severity: critical
            annotations:
                summary: "Prometheus is down"
                description: "Prometheus has been unreachable for more than 2 minutes."

          - alert: AlertmanagerDown
            expr: up{job="alertmanager"} == 0
            for: 2m
            labels:
                severity: critical
            annotations:
                summary: "Alertmanager is down"
                description: "Alertmanager has been unreachable for more than 2 minutes."

          - alert: NodeExporterDown
            expr: up{job="node"} == 0
            for: 2m
            labels:
                severity: warning
            annotations:
                summary: "Node exporter is down"
                description: "Node exporter has been unreachable for more than 2 minutes."

          - alert: PostgresExporterDown
            expr: up{job="postgres"} == 0
            for: 2m
            labels:
                severity: warning
            annotations:
                summary: "Postgres exporter is down"
                description: "Postgres exporter has been unreachable for more than 2 minutes."

          - alert: RedisExporterDown
            expr: up{job="redis"} == 0
            for: 2m
            labels:
                severity: warning
            annotations:
                summary: "Redis exporter is down"
                description: "Redis exporter has been unreachable for more than 2 minutes."

          - alert: LokiDown
            expr: loki_process_up == 0
            for: 2m
            labels:
                severity: critical
            annotations:
                summary: "Loki is down"
                description: "Loki has been unreachable for more than 2 minutes."

          - alert: HighLatencyP95
            expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 2
            for: 5m
            labels:
                severity: warning
            annotations:
                summary: "High API latency (p95 > 2s)"
                description: "The 95th percentile API response time has exceeded 2 seconds for more than 5 minutes."

          - alert: HighErrorRate
            expr: |
                sum(rate(http_requests_total{status_code=~"5.."}[5m])) by (job)
                /
                sum(rate(http_requests_total[5m])) by (job)
                > 0.05
            for: 5m
            labels:
                severity: warning
            annotations:
                summary: "High error rate (>5%)"
                description: "More than 5% of requests are returning 5xx errors over the last 5 minutes."

          - alert: DatabasePoolExhaustion
            expr: db_pool_checked_out / db_pool_size > 0.9
            for: 1m
            labels:
                severity: critical
            annotations:
                summary: "Database connection pool near exhaustion"
                description: "More than 90% of database connections are checked out."

          - alert: RedisDown
            expr: redis_up == 0
            for: 1m
            labels:
                severity: critical
            annotations:
                summary: "Redis is down"
                description: "Redis exporter reports Redis is unreachable."

          - alert: PostgresDown
            expr: pg_up == 0
            for: 1m
            labels:
                severity: critical
            annotations:
                summary: "PostgreSQL is down"
                description: "Postgres exporter reports PostgreSQL is unreachable."

          - alert: OSUAPIDown
            expr: |
                sum(rate(osu_api_requests_total{status_code=~"5.."}[5m])) by (job)
                /
                sum(rate(osu_api_requests_total[5m])) by (job)
                > 0.5
            for: 5m
            labels:
                severity: warning
            annotations:
                summary: "High osu! API error rate (>50%)"
                description: "More than 50% of osu! API requests are failing."

          - alert: DaemonServiceDown
            expr: daemon_service_running == 0
            for: 1m
            labels:
                severity: critical
            annotations:
                summary: "Daemon service {{ $labels.service }} is down"
                description: "The {{ $labels.service }} daemon service has stopped running."

          - alert: DaemonJobFailureRateHigh
            expr: |
                sum(rate(daemon_jobs_total{status="failure"}[10m])) by (service)
                /
                sum(rate(daemon_jobs_total[10m])) by (service)
                > 0.5
            for: 10m
            labels:
                severity: warning
            annotations:
                summary: "High daemon job failure rate for {{ $labels.service }}"
                description: "More than 50% of daemon jobs have been failing for {{ $labels.service }} over the last 10 minutes."

          - alert: DaemonJobDurationHigh
            expr: histogram_quantile(0.95, sum(rate(daemon_job_duration_seconds_bucket[10m])) by (le, service)) > 300
            for: 10m
            labels:
                severity: warning
            annotations:
                summary: "Daemon job duration p95 high for {{ $labels.service }}"
                description: "The 95th percentile job duration for {{ $labels.service }} has exceeded 5 minutes for over 10 minutes."

          - alert: HighCPUUsage
            expr: rate(process_cpu_seconds_total[5m]) > 0.8
            for: 5m
            labels:
                severity: warning
            annotations:
                summary: "High CPU usage (>80%)"
                description: "The process has been using more than 80% CPU for 5 minutes."

          - alert: HighMemoryUsage
            expr: process_resident_memory_bytes > 3.5 * 1024 * 1024 * 1024
            for: 5m
            labels:
                severity: warning
            annotations:
                summary: "High memory usage (>3.5GB)"
                description: "The process is using more than 3.5GB of resident memory."

          - alert: RateLimitBlockRateHigh
            expr: |
                sum(rate(rate_limit_attempts_total{result="blocked"}[5m])) by (job)
                /
                sum(rate(rate_limit_attempts_total[5m])) by (job)
                > 0.1
            for: 5m
            labels:
                severity: info
            annotations:
                summary: "High rate limit block rate (>10%)"
                description: "More than 10% of requests are being rate limited."

          - alert: ErrorRateHigh
            expr: job:errors:rate5m > 1
            for: 5m
            labels:
                severity: warning
            annotations:
                summary: "Elevated application error rate"
                description: "errors_total is firing at more than 1/s for 5 minutes — check Errors row on API & Requests."

          - alert: NewErrorTypeAppeared
            expr: count(count by (error_type) (errors_total)) > count(count by (error_type) (errors_total offset 1h))
            for: 0m
            labels:
                severity: info
            annotations:
                summary: "A new error_type has appeared in the last hour"
                description: "The distinct error_type cardinality on errors_total increased — check for a new failure mode."

          - alert: SearchHighLatency
            expr: job:search_duration:p95_5m > 2
            for: 10m
            labels:
                severity: warning
            annotations:
                summary: "Search p95 latency high for scope {{ $labels.scope }}"
                description: "Search queries for scope {{ $labels.scope }} have exceeded 2s p95 for 10 minutes."

          - alert: OsuApiErrorTypeRatioHigh
            expr: job:osu_api_errors:ratio5m > 0.2
            for: 10m
            labels:
                severity: warning
            annotations:
                summary: "osu! API structured error ratio high"
                description: "More than 20% of osu! API calls are producing structured errors (osu_api_errors_total) over 10 minutes — complements OSUAPIDown."

          - alert: RateLimitRetryStorm
            expr: job:rate_limit_retries:rate5m > 5
            for: 5m
            labels:
                severity: warning
            annotations:
                summary: "High osu! API rate-limit retry rate for {{ $labels.endpoint }}"
                description: "Graveboards is retrying rate-limited osu! API calls frequently — the app may be throttled by osu!."

          - alert: HighClientErrorRate
            expr: job:http_requests_4xx:ratio5m > 0.25
            for: 10m
            labels:
                severity: info
            annotations:
                summary: "High 4xx rate (>25%)"
                description: "A quarter of requests are client errors — could indicate API misuse, a bad client release, or a broken integration."

          - alert: PostgresCacheHitRatioLow
            expr: job:pg_cache:hit_ratio5m < 0.90
            for: 15m
            labels:
                severity: warning
            annotations:
                summary: "Postgres buffer cache hit ratio low"
                description: "Cache hit ratio has been below 90% for 15 minutes — may indicate memory pressure or a query regression."

          - alert: RedisEvictionsSpike
            expr: rate(redis_evicted_keys_total[5m]) > 0
            for: 5m
            labels:
                severity: warning
            annotations:
                summary: "Redis is evicting keys"
                description: "Redis has evicted keys in the last 5 minutes — check maxmemory policy and memory headroom."

          - alert: AuthLockoutSpike
            expr: job:auth_rate_limit:lockout_rate5m > 0.1
            for: 5m
            labels:
                severity: warning
            annotations:
                summary: "Elevated auth lockout rate"
                description: "IPs are being locked out for auth failures faster than usual — possible credential-stuffing or brute-force attempt."

          - alert: DaemonJobCriticalFailureRate
            expr: sum(rate(daemon_jobs_total{status="critical"}[10m])) by (service) > 0
            for: 5m
            labels:
                severity: critical
            annotations:
                summary: "Critical daemon job failures for {{ $labels.service }}"
                description: "{{ $labels.service }} has recorded critical-severity job failures in the last 10 minutes."
