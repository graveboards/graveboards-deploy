global:
    scrape_interval: 15s
    evaluation_interval: 15s
    scrape_timeout: 10s

    external_labels:
        cluster: graveboards
        environment: prod

rule_files:
    - alerts.yml
    - rules/recording.yml

alerting:
    alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

scrape_configs:
    - job_name: graveboards-backend
      metrics_path: /metrics
      static_configs:
          - targets:
              - graveboards-backend:8000

    - job_name: prometheus
      static_configs:
          - targets:
              - localhost:9090

    - job_name: alertmanager
      static_configs:
          - targets:
              - alertmanager:9093

    - job_name: node
      static_configs:
          - targets:
              - node-exporter:9100

    - job_name: postgres
      static_configs:
          - targets:
              - postgres-exporter:9187

    - job_name: redis
      static_configs:
          - targets:
              - redis-exporter:9121
