# Graveboards Production Deployment - Monitoring Override
# Usage: docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml up -d
#
# This file adds Prometheus, Grafana, Alertmanager, Loki, and Promtail for
# comprehensive observability.

services:
    prometheus:
        image: prom/prometheus:v2.51.0
        container_name: graveboards-prometheus
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
            - "--web.console.libraries=/etc/prometheus/console_libraries"
            - "--web.console.templates=/etc/prometheus/consoles"
            - "--web.enable-lifecycle"
            - "--web.listen-address=0.0.0.0:9090"
        volumes:
            - ./monitoring/prometheus:/etc/prometheus:ro
            - prometheus-data:/prometheus
        networks:
            - app
        ports:
            - "9090:9090"
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 10s
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 1G
                reservations:
                    cpus: '0.5'
                    memory: 512M

    grafana:
        image: grafana/grafana:11.0.0
        container_name: graveboards-grafana
        environment:
            - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
            - GF_USERS_ALLOW_SIGN_UP=false
            - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3001}
            - GF_AUTH_ANONYMOUS_ENABLED=false
            - GF_LOG_LEVEL=warn
        volumes:
            - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
            - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
            - grafana-data:/var/lib/grafana
        networks:
            - app
        ports:
            - "3001:3000"
        depends_on:
            prometheus:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 30s
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 256M

    alertmanager:
        image: prom/alertmanager:v0.27.0
        container_name: graveboards-alertmanager
        command:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
            - "--web.listen-address=0.0.0.0:9093"
        volumes:
            - ./monitoring/alertmanager:/etc/alertmanager:ro
            - alertmanager-data:/alertmanager
        networks:
            - app
        ports:
            - "9093:9093"
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 10s
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '0.25'
                    memory: 256M
                reservations:
                    cpus: '0.1'
                    memory: 128M

    loki:
        image: grafana/loki:3.0.0
        container_name: graveboards-loki
        command: -config.file=/etc/loki/local-config.yaml
        ports:
            - "3100:3100"
        volumes:
            - loki-data:/loki
        networks:
            - app
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 10s
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 256M

    promtail:
        image: grafana/promtail:3.0.0
        container_name: graveboards-promtail
        volumes:
            - /var/lib/docker/containers:/var/lib/docker/containers:ro
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - ./monitoring/promtail:/etc/promtail:ro
        networks:
            - app
        command: -config.file=/etc/promtail/config.yml
        depends_on:
            loki:
                condition: service_healthy
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '0.25'
                    memory: 256M
                reservations:
                    cpus: '0.1'
                    memory: 128M

volumes:
    prometheus-data:
    grafana-data:
    alertmanager-data:
    loki-data:

networks:
    app:
        driver: bridge
