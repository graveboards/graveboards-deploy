name: graveboards

services:
    postgresql:
        image: postgres:16-alpine
        container_name: graveboards-postgresql
        env_file:
            - ../graveboards-backend/.env.test
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_USERNAME=${POSTGRESQL_USERNAME:-postgres}
            - POSTGRES_PASSWORD=${POSTGRESQL_PASSWORD:-postgres}
            - POSTGRES_DATABASE=${POSTGRESQL_DATABASE:-graveboards_test}
            - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
        volumes:
            - postgresql-test-data:/var/lib/postgresql/data
            - ../graveboards-backend/docker-init:/docker-entrypoint-initdb.d:ro
        networks:
            - app
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-postgres}" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 2G
                reservations:
                    cpus: '0.5'
                    memory: 1G
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    redis:
        image: redis:7-alpine
        container_name: graveboards-redis
        env_file:
            - ../graveboards-backend/.env.test
        ports:
            - "6379:6379"
        environment:
            - REDIS_PASSWORD=${REDIS_PASSWORD:-}
        entrypoint: ["/bin/sh", "/entrypoint/redis-entrypoint.sh"]
        volumes:
            - ./redis-entrypoint.sh:/entrypoint/redis-entrypoint.sh:ro
            - redis-test-data:/data
        networks:
            - app
        healthcheck:
            test: [ "CMD-SHELL", "if [ -n \"$REDIS_PASSWORD\" ]; then redis-cli -a \"$REDIS_PASSWORD\" ping; else redis-cli ping; fi" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 1G
                reservations:
                    cpus: '0.5'
                    memory: 512M
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    backend:
        container_name: graveboards-backend
        build:
            context: ../graveboards-backend
            dockerfile: Dockerfile
            target: test-runner
        user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
        env_file:
            - ../graveboards-backend/.env.test
        volumes:
            - instance-test-data:/app/instance
        networks:
            - app
        environment:
            - ENV=test
            - POSTGRESQL_HOST=postgresql
            - POSTGRESQL_PORT=5432
            - POSTGRESQL_USERNAME=${POSTGRESQL_USERNAME:-postgres}
            - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD:-postgres}
            - POSTGRESQL_DATABASE=${POSTGRESQL_DATABASE:-graveboards_test}
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_DB=${REDIS_DB:-15}
            - REDIS_PASSWORD=${REDIS_PASSWORD:-}
            - QUIET=true
            - DISABLE_SECURITY=false
        profiles:
            - test
        depends_on:
            postgresql:
                condition: service_healthy
            redis:
                condition: service_healthy
        command: [ "pytest", "-v"]

volumes:
    postgresql-test-data:
    redis-test-data:
    instance-test-data:

networks:
    app:
        driver: bridge
